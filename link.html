<html lang="ja">

</head>

<body>

<div class="layout">

<nav class="nav-menu">

</button>

<!-- メイン -->
<main class="timeline">

<div class="timeline-header">
<h1>おみくじ</h1>
</div>

<div class="fortune-card">

<h2>
 今日の運勢
</h2>

<p id="fortune-result">
ボタンを押してください
</p>

<button id="fortune-button">
運勢を見る
</button>

<!-- 右 -->

<div class="trend">
大吉
</div>

<div class="trend">
中吉
</div>

<div class="trend">

</div>

<div class="trend">

</div>

</div>

<script>

const fortunes = [
"🌟 大吉",
"✨ 中吉",
"🍀 小吉",
"🎴 吉",
"☁️ 末吉"
];

document
.getElementById("fortune-button")
.onclick = function(){

const random =
Math.floor(Math.random()*fortunes.length);

document
.getElementById("fortune-result")
.innerHTML =
fortunes[random];

};

</script>
