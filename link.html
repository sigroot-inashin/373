</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar-left">

    <div class="logo">

      <span class="sig">
        SIG
      </span>

      <span class="official">
        OFFICIAL
      </span>

    </div>

    <nav class="nav-menu">

      <a href="index.html" class="active">
        Home
      </a>

      <a href="service.html">

      </a>

      <a href="projects.html">

      <a href="labs.html">

      <a href="company.html">

      </a>

    </nav>

    <button class="main-button">
      Platform Access
    </button>

  </aside>
<!-- MAIN -->
<main class="timeline">

<div class="timeline-header">
<h1>Fortune System</h1>
</div>

<section class="fortune-wrapper">

<div class="fortune-card">

<div class="fortune-label">
SIG RANDOM SYSTEM
</div>

<h2>
Daily Fortune
</h2>

<p id="fortune-result">
Awaiting system execution.
</p>

<button id="fortune-button">
Run Fortune
</button>

</div>

</section>

</main>

<!-- RIGHT -->
<aside class="sidebar-right">

<div class="side-card">

<h2>
Fortune Levels
</h2>

<div class="trend">
Excellent
</div>

<div class="trend">
Good
</div>

<div class="trend">
Average
</div>

<div class="trend">
Low
</div>

</div>

<div class="side-card">

<h2>
System State
</h2>

<div class="trend">
Random Engine — Online
</div>

<div class="trend">
Probability System — Stable
</div>

</div>

</aside>

</div>

<script>

const fortunes = [

"Excellent — High probability of success today.",

"Good — Stable progress is expected.",

"Average — Maintain a balanced pace.",

"Low — Careful decisions are recommended."

];

document
.getElementById("fortune-button")
.onclick = function(){

const random =
Math.floor(Math.random()*fortunes.length);

document
.getElementById("fortune-result")
.innerHTML =
fortunes[random];

};

</script>
