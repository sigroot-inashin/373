<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIa Community</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="layout">

    <!-- =========================
         LEFT SIDEBAR
    ========================== -->

    <aside class="left-sidebar">

        <div class="logo">
            RIa
        </div>

        <nav class="sidebar-menu">

            <a href="#" class="active">
                <i class="fa-solid fa-house"></i>
                <span>ホーム</span>
            </a>

            <a href="#">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>検索</span>
            </a>

            <a href="#">
                <i class="fa-regular fa-bell"></i>
                <span>通知</span>
            </a>

            <a href="#">
                <i class="fa-regular fa-envelope"></i>
                <span>メッセージ</span>
            </a>

            <a href="#">
                <i class="fa-solid fa-gamepad"></i>
                <span>ゲーム</span>
            </a>

            <a href="#">
                <i class="fa-regular fa-user"></i>
                <span>プロフィール</span>
            </a>

        </nav>

        <button class="post-button">
            投稿する
        </button>

        <!-- プロフィール -->

        <div class="profile-box">

            <img src="images/sample1.jpg">

            <div>

                <div class="profile-name">
                    RIa Official
                </div>

                <div class="profile-id">
                    @ria_official
                </div>

            </div>

        </div>

    </aside>

    <!-- =========================
         MAIN
    ========================== -->

    <main class="main-content">

        <div class="top-bar">
            ホーム
        </div>

        <!-- 投稿 -->

        <article class="tweet">

            <img src="images/sample1.jpg" class="tweet-icon">

            <div class="tweet-body">

                <div class="tweet-header">

                    <span class="tweet-name">
                        RIa Official
                    </span>

                    <span class="tweet-id">
                        @ria_official
                    </span>

                    <span class="tweet-time">
                        ・5分
                    </span>

                </div>

                <div class="tweet-text">

                    RIa Communityへようこそ。<br>
                    新しいデザインへアップデートしました。

                </div>

                <div class="tweet-actions">

                    <i class="fa-regular fa-comment"></i>

                    <i class="fa-solid fa-retweet"></i>

                    <i class="fa-regular fa-heart"></i>

                    <i class="fa-solid fa-chart-simple"></i>

                </div>

            </div>

        </article>

        <!-- 投稿 -->

        <article class="tweet">

            <img src="images/sample2.jpg" class="tweet-icon">

            <div class="tweet-body">

                <div class="tweet-header">

                    <span class="tweet-name">
                        RIa Games
                    </span>

                    <span class="tweet-id">
                        @ria_games
                    </span>

                    <span class="tweet-time">
                        ・1時間
                    </span>

                </div>

                <div class="tweet-text">

                    オセロ機能をアップデートしました。<br>
                    新モードを追加しています。

                </div>

                <img src="images/1.jpg" class="tweet-image">

                <div class="tweet-actions">

                    <i class="fa-regular fa-comment"></i>

                    <i class="fa-solid fa-retweet"></i>

                    <i class="fa-regular fa-heart"></i>

                    <i class="fa-solid fa-chart-simple"></i>

                </div>

            </div>

        </article>

        <!-- 投稿 -->

        <article class="tweet">

            <img src="images/sample1.jpg" class="tweet-icon">

            <div class="tweet-body">

                <div class="tweet-header">

                    <span class="tweet-name">
                        開発ログ
                    </span>

                    <span class="tweet-id">
                        @developer
                    </span>

                    <span class="tweet-time">
                        ・3時間
                    </span>

                </div>

                <div class="tweet-text">

                    UIアニメーションを追加中。<br>
                    今後さらにアップデート予定です。

                </div>

                <div class="tweet-actions">

                    <i class="fa-regular fa-comment"></i>

                    <i class="fa-solid fa-retweet"></i>

                    <i class="fa-regular fa-heart"></i>

                    <i class="fa-solid fa-chart-simple"></i>

                </div>

            </div>

        </article>

    </main>

    <!-- =========================
         RIGHT SIDEBAR
    ========================== -->

    <aside class="right-sidebar">

        <div class="search-box">

            <input type="text"
            placeholder="検索">

        </div>

        <!-- トレンド -->

        <div class="trend-box">

            <h2>トレンド</h2>

            <div class="trend-item">

                <span>ゲーム</span>

                <strong>オセロ</strong>

            </div>

            <div class="trend-item">

                <span>おすすめ</span>

                <strong>RIa Community</strong>

            </div>

            <div class="trend-item">

                <span>開発</span>

                <strong>UIアップデート</strong>

            </div>

        </div>

    </aside>

</div>

</body>

</html>
