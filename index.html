<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIa Official Site</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="layout">

    <!-- 左サイド -->
    <aside class="left-sidebar">

        <div class="logo">
            <i class="fa-brands fa-x-twitter"></i>
        </div>

        <nav class="sidebar-menu">

            <a href="index.html" class="active">
                <i class="fa-solid fa-house"></i>
                <span>ホーム</span>
            </a>

            <a href="#">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>検索</span>
            </a>

            <a href="#">
                <i class="fa-regular fa-bell"></i>
                <span>通知</span>
            </a>

            <a href="#">
                <i class="fa-regular fa-envelope"></i>
                <span>メッセージ</span>
            </a>

            <a href="company.html">
                <i class="fa-regular fa-user"></i>
                <span>プロフィール</span>
            </a>

            <a href="service.html">
                <i class="fa-solid fa-gamepad"></i>
                <span>サービス</span>
            </a>

        </nav>

        <button class="post-button">
            ポストする
        </button>

        <!-- 左下プロフィール -->
        <div class="profile-box">

            <img src="images/sample1.jpg">

            <div>
                <div class="profile-name">RIa</div>
                <div class="profile-id">@ria_site</div>
            </div>

        </div>

    </aside>

    <!-- メイン -->
    <main class="main-content">

        <div class="top-bar">
            ホーム
        </div>

        <!-- 投稿 -->
        <article class="tweet">

            <img src="images/sample1.jpg" class="tweet-icon">

            <div class="tweet-body">

                <div class="tweet-header">
                    <span class="tweet-name">RIa Official</span>
                    <span class="tweet-id">@ria_site</span>
                    <span class="tweet-time">· 5分</span>
                </div>

                <div class="tweet-text">
                    当ウェブサイトのフランス語版が完成しました。
                </div>

                <div class="tweet-actions">
                    <i class="fa-regular fa-comment"></i>
                    <i class="fa-solid fa-retweet"></i>
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-solid fa-chart-simple"></i>
                </div>

            </div>

        </article>

        <!-- 投稿 -->
        <article class="tweet">

            <img src="images/sample2.jpg" class="tweet-icon">

            <div class="tweet-body">

                <div class="tweet-header">
                    <span class="tweet-name">RIa Official</span>
                    <span class="tweet-id">@ria_site</span>
                    <span class="tweet-time">· 1時間</span>
                </div>

                <div class="tweet-text">
                    オセロ機能を追加しました！！
                </div>

                <img src="images/1.jpg" class="tweet-image">

                <div class="tweet-actions">
                    <i class="fa-regular fa-comment"></i>
                    <i class="fa-solid fa-retweet"></i>
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-solid fa-chart-simple"></i>
                </div>

            </div>

        </article>

        <!-- 投稿 -->
        <article class="tweet">

            <img src="images/sample1.jpg" class="tweet-icon">

            <div class="tweet-body">

                <div class="tweet-header">
                    <span class="tweet-name">RIa Official</span>
                    <span class="tweet-id">@ria_site</span>
                    <span class="tweet-time">· 3時間</span>
                </div>

                <div class="tweet-text">
                    サイトテーマカラーを変更しました。
                </div>

                <div class="tweet-actions">
                    <i class="fa-regular fa-comment"></i>
                    <i class="fa-solid fa-retweet"></i>
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-solid fa-chart-simple"></i>
                </div>

            </div>

        </article>

    </main>

    <!-- 右サイド -->
    <aside class="right-sidebar">

        <div class="search-box">
            <input type="text" placeholder="検索">
        </div>

        <div class="trend-box">

            <h2>おすすめ</h2>

            <div class="trend-item">
                <span>ゲーム・トレンド</span>
                <strong>オセロ</strong>
            </div>

            <div class="trend-item">
                <span>人気サイト</span>
                <strong>BING</strong>
            </div>

            <div class="trend-item">
                <span>おすすめ</span>
                <strong>FireFox</strong>
            </div>

        </div>

    </aside>

</div>

</body>
</html>
